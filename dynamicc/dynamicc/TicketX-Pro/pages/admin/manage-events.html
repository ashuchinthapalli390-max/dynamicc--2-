<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - TicketX Pro Admin</title>
    <link rel="stylesheet" href="../../src/css/reset.css">
    <link rel="stylesheet" href="../../src/css/variables.css">
    <link rel="stylesheet" href="../../src/css/global.css">
    <link rel="stylesheet" href="../../src/css/navbar.css">
    <link rel="stylesheet" href="../../src/css/dashboard.css">
    <style>
        .event-form { background: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select {
            padding: 10px;
            border: 1px solid var(--light);
            border-radius: 4px;
            font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .event-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .event-card__image { width: 100%; height: 180px; background: var(--light); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .event-card__content { padding: 15px; }
        .event-card__title { font-weight: 600; margin-bottom: 8px; }
        .event-card__meta { font-size: 12px; color: var(--light-dark); margin-bottom: 10px; }
        .event-card__actions { display: flex; gap: 8px; }
        .event-card__actions button { flex: 1; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar__logo" onclick="goToHome()">🎟️ TicketX Pro Admin</div>
            <ul class="navbar__menu">
                <li><a href="dashboard.html">← Back to Dashboard</a></li>
                <li><button class="btn-login" onclick="adminLogout()">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Manage Events -->
    <section>
        <div class="container-lg">
            <h1 id="pageTitle">Manage Events</h1>

            <!-- Add/Edit Event Form -->
            <div class="event-form" id="eventFormContainer">
                <h2 id="formTitle">Add New Event</h2>
                
                <form id="eventForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventName">Event Name *</label>
                            <input type="text" id="eventName" placeholder="Enter event name" required>
                        </div>
                        <div class="form-group">
                            <label for="eventCategory">Category *</label>
                            <select id="eventCategory" required>
                                <option value="">Select Category</option>
                                <option value="movies">Movies</option>
                                <option value="trains">Trains</option>
                                <option value="flights">Flights</option>
                                <option value="bus">Bus</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventDate">Date *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label for="eventTime">Time</label>
                            <input type="time" id="eventTime">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventPrice">Price (₹) *</label>
                            <input type="number" id="eventPrice" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label for="eventSeats">Total Seats *</label>
                            <input type="number" id="eventSeats" min="1" placeholder="0" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventLocation">Location *</label>
                            <input type="text" id="eventLocation" placeholder="Enter location" required>
                        </div>
                        <div class="form-group">
                            <label for="eventRating">Rating</label>
                            <select id="eventRating">
                                <option value="">Select Rating</option>
                                <option value="4.5">⭐ 4.5</option>
                                <option value="4.6">⭐ 4.6</option>
                                <option value="4.7">⭐ 4.7</option>
                                <option value="4.8">⭐ 4.8</option>
                                <option value="4.9">⭐ 4.9</option>
                                <option value="5">⭐ 5.0</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-group">
                            <label for="eventDescription">Description</label>
                            <textarea id="eventDescription" placeholder="Enter event description"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <button type="submit" class="btn btn-primary">Save Event</button>
                        <button type="button" class="btn btn-outline" onclick="cancelForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Events List -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 id="listTitle">Events List</h2>
                    <input type="text" id="searchEvents" placeholder="Search events..." style="padding: 10px; border: 1px solid var(--light); border-radius: 4px; width: 250px;">
                </div>

                <div class="event-grid" id="eventsGrid">
                    <div style="text-align: center; padding: 40px; grid-column: 1/-1;">Loading events...</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 TicketX Pro. All rights reserved. | Admin Panel</p>
    </footer>

    <script src="../../src/js/core/storage.js"></script>
    <script src="../../src/js/core/auth.js"></script>
    <script src="../../src/js/core/utils.js"></script>
    <script src="../../src/js/core/router.js"></script>
    <script src="../../src/js/admin/manage-events.js"></script>
</body>
</html>
