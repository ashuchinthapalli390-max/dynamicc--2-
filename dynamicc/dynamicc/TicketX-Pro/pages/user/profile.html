<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - TicketX Pro</title>
    <link rel="stylesheet" href="../../src/css/reset.css">
    <link rel="stylesheet" href="../../src/css/variables.css">
    <link rel="stylesheet" href="../../src/css/global.css">
    <link rel="stylesheet" href="../../src/css/navbar.css">
    <link rel="stylesheet" href="../../src/css/dashboard.css">
    <style>
        .settings-container { max-width: 600px; margin: 40px auto; }
        .settings-section { background: white; padding: 30px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .settings-section h3 { margin-bottom: 20px; color: var(--primary); }
        .settings-group { margin-bottom: 20px; }
        .settings-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .settings-group input, .settings-group textarea { width: 100%; padding: 10px; border: 1px solid var(--light); border-radius: 4px; font-family: inherit; }
        .settings-group textarea { min-height: 80px; resize: vertical; }
        .settings-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 20px; }
        .danger-zone { border-top: 1px solid #fee2e2; margin-top: 30px; padding-top: 30px; }
        .danger-zone button { background: #dc2626; }
        .danger-zone button:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar__logo" onclick="goToHome()">🎟️ TicketX Pro</div>
            <ul class="navbar__menu">
                <li><a href="../../index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><button class="btn-login" onclick="logout()">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Settings Page -->
    <section>
        <div class="settings-container">
            <h1>Profile Settings</h1>

            <!-- Profile Section -->
            <div class="settings-section">
                <h3>👤 My Profile</h3>
                
                <div style="text-align: center; margin-bottom: 30px;">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <button class="btn btn-outline" style="margin-top: 10px;">Change Avatar</button>
                </div>

                <form id="profileForm">
                    <div class="settings-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="settings-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" disabled>
                    </div>

                    <div class="settings-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter your phone number">
                    </div>

                    <div class="settings-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" placeholder="Tell us something about yourself"></textarea>
                    </div>

                    <div class="settings-buttons">
                        <button type="button" class="btn btn-outline" onclick="resetForm()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>

            <!-- Security Section -->
            <div class="settings-section">
                <h3>🔒 Security</h3>

                <form id="passwordForm">
                    <div class="settings-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password" required>
                    </div>

                    <div class="settings-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>

                    <div class="settings-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>

                    <div class="settings-buttons">
                        <button type="submit" class="btn btn-primary">Update Password</button>
                    </div>
                </form>
            </div>

            <!-- Preferences Section -->
            <div class="settings-section">
                <h3>⚙️ Preferences</h3>

                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="emailNotifications" checked>
                        Receive email notifications for bookings
                    </label>
                </div>

                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="smsNotifications" checked>
                        Receive SMS notifications
                    </label>
                </div>

                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="newsletter" checked>
                        Subscribe to newsletter
                    </label>
                </div>

                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="deals" checked>
                        Send me special offers and deals
                    </label>
                </div>

                <div class="settings-buttons">
                    <button type="button" class="btn btn-primary" onclick="savePreferences()">Save Preferences</button>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="settings-section danger-zone">
                <h3>⚠️ Danger Zone</h3>
                <p style="color: var(--light-dark); margin-bottom: 20px;">
                    Once you delete your account, there is no going back. Please be certain.
                </p>
                <button type="button" class="btn" onclick="deleteAccount()">Delete My Account</button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 TicketX Pro. All rights reserved.</p>
    </footer>

    <script src="../../src/js/core/storage.js"></script>
    <script src="../../src/js/core/auth.js"></script>
    <script src="../../src/js/core/utils.js"></script>
    <script src="../../src/js/core/router.js"></script>
    <script src="../../src/js/pages/profile.js"></script>
</body>
</html>
