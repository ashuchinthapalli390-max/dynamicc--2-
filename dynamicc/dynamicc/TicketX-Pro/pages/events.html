<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - TicketX Pro</title>
    <link rel="stylesheet" href="../../src/css/reset.css">
    <link rel="stylesheet" href="../../src/css/variables.css">
    <link rel="stylesheet" href="../../src/css/global.css">
    <link rel="stylesheet" href="../../src/css/navbar.css">
    <link rel="stylesheet" href="../../src/css/cards.css">
    <link rel="stylesheet" href="../../src/css/search.css">
    <style>
        .events-container {
            padding: 40px 0;
        }

        .search-section {
            background: var(--bg-light);
            padding: 30px 0;
            margin-bottom: 40px;
            border-radius: 10px;
        }

        .event-filters {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .event-filters select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
        }

        .event-categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .category-btn {
            padding: 10px 20px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .event-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .event-card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .event-card-content {
            padding: 20px;
        }

        .event-category-badge {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .event-card h3 {
            margin: 10px 0;
            color: var(--text-dark);
            font-size: 1.1rem;
        }

        .event-details {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-price {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .event-seats {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 5px 0;
        }

        .event-rating {
            color: var(--warning-color);
            margin: 5px 0;
        }

        .btn-event-details {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-event-details:hover {
            background: var(--secondary-color);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .event-filters {
                grid-template-columns: 1fr;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar__logo" onclick="goToHome()">🎟️ TicketX Pro</div>
            <ul class="navbar__menu" id="navbarMenu">
                <!-- Dynamically populated by navbar.js -->
            </ul>
        </div>
    </nav>

    <!-- Events Page -->
    <section class="events-container">
        <div class="container">
            <h1>🎪 All Events & Halls</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Book tickets for concerts, dance shows, cultural events, and reserve halls for your occasions</p>

            <!-- Search & Filter Section -->
            <div class="search-section">
                <div class="event-filters">
                    <div>
                        <label>Location:</label>
                        <select id="locationFilter" onchange="filterEvents()">
                            <option value="">All Locations</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Delhi">Delhi</option>
                        </select>
                    </div>
                    <div>
                        <label>Category:</label>
                        <select id="categoryFilter" onchange="filterEvents()">
                            <option value="">All Categories</option>
                            <option value="Dance">Dance</option>
                            <option value="Singing">Singing</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Reality Show">Reality Show</option>
                            <option value="Stand-up Comedy">Stand-up Comedy</option>
                            <option value="Functional Hall">Functional Hall</option>
                            <option value="Conventional Hall">Conventional Hall</option>
                            <option value="Meeting Hall">Meeting Hall</option>
                            <option value="Open Auditorium">Open Auditorium</option>
                        </select>
                    </div>
                    <div>
                        <label>Price Range:</label>
                        <select id="priceFilter" onchange="filterEvents()">
                            <option value="">Any Price</option>
                            <option value="0-500">₹0 - ₹500</option>
                            <option value="500-2000">₹500 - ₹2000</option>
                            <option value="2000-5000">₹2000 - ₹5000</option>
                            <option value="5000+">₹5000+</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label>Quick Search:</label>
                    <input type="text" id="searchInput" placeholder="Search events by name or category..." onkeyup="filterEvents()" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 5px;">
                </div>
            </div>

            <!-- Events Grid -->
            <div id="eventsGrid" class="events-grid">
                <!-- Populated by JS -->
            </div>

            <div id="noResults" class="no-results" style="display: none;">
                <p>No events found. Try adjusting your filters.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 TicketX Pro. All rights reserved. | Book with confidence ✨</p>
    </footer>

    <!-- New Booking System -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <script src="../../src/js/user-auth.js"></script>
    <script src="../../src/js/booking-payment.js"></script>
    <script src="../../src/js/universal-booking.js"></script>
    <script src="../../src/js/navbar-complete.js"></script>

    <!-- Legacy Scripts -->
    <script src="../../src/js/config/images.js"></script>
    <script src="../../src/js/core/storage.js"></script>
    <script src="../../src/js/core/auth.js"></script>
    <script src="../../src/js/core/utils.js"></script>
    <script src="../../src/js/core/router.js"></script>
    <script src="../../src/js/api/events-api.js"></script>
    <script>
        let filteredEvents = DUMMY_EVENTS;

        function displayEvents(events) {
            const grid = document.getElementById('eventsGrid');
            const noResults = document.getElementById('noResults');

            if (events.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            grid.innerHTML = events.map(event => `
                <div class="event-card">
                    <div class="event-card-image">${event.image}</div>
                    <div class="event-card-content">
                        <span class="event-category-badge">${event.category}</span>
                        <h3>${event.name}</h3>
                        <div class="event-details">
                            📍 ${event.location}
                        </div>
                        <div class="event-details">
                            📅 ${event.date}
                        </div>
                        <div class="event-details">
                            🕐 ${event.time}
                        </div>
                        <div class="event-details">
                            📍 ${event.venue}
                        </div>
                        <div class="event-rating">⭐ ${event.rating}/5</div>
                        <div class="event-seats">
                            Available: ${event.available}/${event.seats} seats
                        </div>
                        <div class="event-price">₹${event.price}</div>
                        <button class="btn-event-details" onclick="bookEvent('${event.id}', '${event.name}', ${event.price})">
                            Book Now
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterEvents() {
            const location = document.getElementById('locationFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const priceRange = document.getElementById('priceFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            filteredEvents = DUMMY_EVENTS.filter(event => {
                let matches = true;

                if (location && event.location !== location) matches = false;
                if (category && event.category !== category) matches = false;
                
                if (priceRange) {
                    if (priceRange === '0-500' && event.price > 500) matches = false;
                    if (priceRange === '500-2000' && (event.price < 500 || event.price > 2000)) matches = false;
                    if (priceRange === '2000-5000' && (event.price < 2000 || event.price > 5000)) matches = false;
                    if (priceRange === '5000+' && event.price < 5000) matches = false;
                }

                if (search && !event.name.toLowerCase().includes(search) && !event.category.toLowerCase().includes(search)) {
                    matches = false;
                }

                return matches;
            });

            displayEvents(filteredEvents);
        }

        function bookEvent(eventId, eventName, price) {
            UniversalBookingHandler.showBookingForm({
                name: eventName,
                price: price,
                category: 'Events',
                description: 'Premium event booking experience',
                rating: '4.5'
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            NavbarManager.renderNavbar();
            displayEvents(DUMMY_EVENTS);
        });
    </script>
</body>
</html>
