<div class="event-card">
    <img src="path/to/event-image.jpg" alt="Event Image" class="event-image">
    <div class="event-details">
        <h3 class="event-title">Event Title</h3>
        <p class="event-date">Date: <span class="date-value">MM/DD/YYYY</span></p>
        <p class="event-time">Time: <span class="time-value">HH:MM AM/PM</span></p>
        <p class="event-location">Location: <span class="location-value">Venue Name</span></p>
        <p class="event-price">Price: <span class="price-value">$XX.XX</span></p>
        <button class="book-button">Book Now</button>
    </div>
</div>
